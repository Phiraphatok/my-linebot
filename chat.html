<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thai AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1917;
      --text-muted: #9b9890;
      --accent: #1a1917;
      --user-bg: #1a1917;
      --user-text: #f7f6f3;
      --bot-bg: #ffffff;
      --radius: 16px;
      --font: 'IBM Plex Sans Thai', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
      50% { box-shadow: 0 0 0 6px rgba(34,197,94,0.08); }
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .header-clear {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--mono);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .header-clear:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Messages */
    .messages {
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      margin: auto;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.4s 0.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }

    .suggestion:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Message bubble */
    .message {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      font-family: var(--mono);
      font-weight: 500;
    }

    .message.user .avatar {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .message.bot .avatar {
      background: var(--border);
      color: var(--text);
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble-time {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 5px;
      padding: 0 4px;
    }

    .message.user .bubble-time { text-align: right; }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 20px 28px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 18px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 14.5px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 2px 0;
    }

    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      color: white;
    }

    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      font-size: 11.5px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 10px;
      text-align: center;
    }

    /* Error */
    .error-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #ef4444;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-dot"></div>
    <div class="header-text">
      <h1>Thai AI Chatbot</h1>
      <p>General-Qwen3-4B-thai</p>
    </div>
    <button class="header-clear" onclick="clearChat()">ล้างประวัติ</button>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">🤖</span>
      <h2>สวัสดีครับ</h2>
      <p>ถามอะไรก็ได้ครับ ยินดีช่วยเสมอ</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">สวัสดีครับ</button>
        <button class="suggestion" onclick="sendSuggestion(this)">แนะนำตัวเองหน่อย</button>
        <button class="suggestion" onclick="sendSuggestion(this)">ช่วยอะไรได้บ้าง?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">เล่าเรื่องสนุกๆ ให้ฟัง</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="userInput"
        placeholder="พิมพ์ข้อความที่นี่..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter ส่ง · Shift+Enter ขึ้นบรรทัดใหม่</p>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<script>
  // ปรับ URL ให้ตรงกับ HuggingFace Space ของคุณ
  const HF_API_URL = "/api/chat";  // ผ่าน Railway proxy

  let history = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function getTime() {
    return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    const inner = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = getTime();

    inner.appendChild(bubble);
    inner.appendChild(time);
    wrap.appendChild(avatar);
    wrap.appendChild(inner);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'message bot typing';
    wrap.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function showError(msg) {
    const toast = document.getElementById('errorToast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const messages = [
        { role: 'system', content: 'You are a helpful assistant. ตอบเป็นภาษาไทยเสมอ' },
        ...history
      ];

      const res = await fetch(HF_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, max_tokens: 150 })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const reply = data.response || data.output || data.text || 'ไม่ได้รับคำตอบครับ';

      hideTyping();
      appendMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });

      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      hideTyping();
      showError('เชื่อมต่อไม่ได้ กรุณาลองใหม่');
      appendMessage('bot', 'ขอโทษครับ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งครับ');
      console.error(err);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  function sendSuggestion(btn) {
    document.getElementById('userInput').value = btn.textContent;
    sendMessage();
  }

  function clearChat() {
    history = [];
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">🤖</span>
        <h2>สวัสดีครับ</h2>
        <p>ถามอะไรก็ได้ครับ ยินดีช่วยเสมอ</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">สวัสดีครับ</button>
          <button class="suggestion" onclick="sendSuggestion(this)">แนะนำตัวเองหน่อย</button>
          <button class="suggestion" onclick="sendSuggestion(this)">ช่วยอะไรได้บ้าง?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">เล่าเรื่องสนุกๆ ให้ฟัง</button>
        </div>
      </div>`;
  }

  document.getElementById('userInput').focus();
</script>
</body>
</html>
